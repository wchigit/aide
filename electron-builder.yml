appId: com.aide.app
productName: Aide
copyright: Copyright © 2026 Aide

directories:
  output: release
  buildResources: resources

# Only ship the compiled output and production node_modules.
files:
  - out/**/*
  - package.json

# Rebuild native modules (better-sqlite3) for the target platform.
npmRebuild: true

# ---------------------------------------------------------------------------
# macOS
# ---------------------------------------------------------------------------
mac:
  category: public.app-category.productivity
  icon: resources/icon-512.png
  target:
    - target: dmg
      arch: [arm64, x64]
    - target: zip
      arch: [arm64, x64]
  # Produce an unsigned build by default. Signing/notarization can be enabled
  # later by setting identity + the CSC_*/APPLE_* secrets and re-adding
  # hardenedRuntime/entitlements below. `identity: null` is the canonical way to
  # tell electron-builder to skip signing entirely (env vars alone aren't
  # always enough and cause the osx-sign step to fail on CI).
  identity: null

dmg:
  artifactName: ${productName}-${version}-${arch}.${ext}

# ---------------------------------------------------------------------------
# Windows
# ---------------------------------------------------------------------------
win:
  icon: resources/icon-512.png
  target:
    - target: nsis
      arch: [x64]
  # Azure Trusted Signing is picked up automatically when these env vars are
  # set in CI: AZURE_TENANT_ID, AZURE_CLIENT_ID, AZURE_CLIENT_SECRET plus the
  # azureSignOptions below. Without them the build is produced unsigned.

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  artifactName: ${productName}-${version}-Setup.${ext}

# ---------------------------------------------------------------------------
# Linux
# ---------------------------------------------------------------------------
linux:
  icon: resources/icon-512.png
  category: Utility
  target:
    - target: AppImage
      arch: [x64]
    - target: deb
      arch: [x64]

appImage:
  artifactName: ${productName}-${version}-${arch}.${ext}

publish:
  provider: github
  owner: houk-ms
  repo: aide
  releaseType: release
